<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pergunta 😈</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#ff4f8b,#14000d 75%);
    position:relative;
    color:white;
}

.card{
    width:90%;
    max-width:520px;
    padding:45px 30px;
    border-radius:30px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:
    0 0 35px rgba(255,0,100,.35),
    0 0 120px rgba(255,0,120,.15);
}

h1{
    font-size:2.3rem;
    line-height:1.3;
    margin-bottom:50px;
    text-shadow:0 0 20px rgba(255,0,120,.8);
}

.area{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    height:90px;
    position:relative;
}

button{
    border:none;
    padding:16px 34px;
    border-radius:18px;
    font-size:1.15rem;
    font-weight:bold;
    cursor:pointer;
    transition:.15s;
    user-select:none;
    touch-action:none;
}

#yes{
    background:linear-gradient(135deg,#ff006e,#ff4da6);
    color:white;
    box-shadow:0 0 25px rgba(255,0,120,.7);
}

#yes:hover{
    transform:scale(1.08);
}

#no{
    background:#1b1b1b;
    color:white;
    position:fixed;
    left:calc(50% + 80px);
    top:calc(50% + 60px);
    box-shadow:0 0 20px rgba(255,255,255,.12);
}

.party{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.88);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    overflow:hidden;
    z-index:999;
}

.party h2{
    font-size:3rem;
    text-align:center;
    padding:20px;
    text-shadow:
    0 0 10px #ff0080,
    0 0 30px #ff0080,
    0 0 60px #ff0080;
    animation:pulse .7s infinite alternate;
}

.confetti{
    position:absolute;
    top:-20px;
    border-radius:50%;
    animation:fall linear forwards;
}

@keyframes pulse{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.12);
    }
}

@keyframes fall{
    to{
        transform:translateY(120vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>Vai me mandar foto da bunda? 😻</h1>

    <div class="area">
        <button id="yes">Sim 😈</button>
    </div>
</div>

<button id="no">Não 🏃</button>

<div class="party" id="party">
    <h2>🎉 Eba!! hoje eu bato uma 🎉</h2>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const party = document.getElementById("party");

function moveButton(){

    const margin = 12;

    const maxX = window.innerWidth - noBtn.offsetWidth - margin;
    const maxY = window.innerHeight - noBtn.offsetHeight - margin;

    const x = Math.floor(
        Math.random() * (maxX - margin) + margin
    );

    const y = Math.floor(
        Math.random() * (maxY - margin) + margin
    );

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

["mouseenter","touchstart","click"].forEach(event=>{
    noBtn.addEventListener(event,moveButton,{passive:true});
});

yesBtn.addEventListener("click",()=>{

    party.style.display = "flex";

    requestAnimationFrame(()=>{

        const total = 120;

        for(let i=0;i<total;i++){

            const c = document.createElement("div");

            c.className = "confetti";

            const size = Math.random()*10+6;

            c.style.width = size+"px";
            c.style.height = size+"px";

            c.style.left =
            Math.random()*window.innerWidth+"px";

            c.style.background =
            `hsl(${Math.random()*360},100%,50%)`;

            c.style.animationDuration =
            (Math.random()*2+2)+"s";

            party.appendChild(c);
        }
    });
});
</script>

</body>
</html>
